<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>capacitor-video-processor — exemple</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
  </head>
  <body>
    <main style="font-family: system-ui; padding: 1rem; max-width: 40rem">
      <h1>VideoProcessor.compressVideo</h1>
      <p>
        Sur <strong>Android / iOS</strong>, renseignez des chemins absolus accessibles par l’app (souvent
        via <code>@capacitor/filesystem</code> ou un fichier copié dans le cache). Sur le <strong>web</strong>,
        le plugin retourne l’entrée sans compression.
      </p>
      <label for="inputPath">input</label><br />
      <input id="inputPath" type="text" style="width: 100%; margin-bottom: 0.5rem" placeholder="/path/to/in.mp4" />
      <label for="outputPath">output</label><br />
      <input id="outputPath" type="text" style="width: 100%; margin-bottom: 0.5rem" placeholder="/path/to/out.mp4" />
      <p>
        <button type="button" onclick="runCompress()">Compresser</button>
      </p>
      <pre id="log" style="background: #f4f4f4; padding: 0.75rem; white-space: pre-wrap"></pre>
    </main>
    <script src="./js/example.js" type="module"></script>
  </body>
</html>
